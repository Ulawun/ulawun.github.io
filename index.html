<!DOCTYPE html>

<title>Ulawun</title>
<script>

const version = 260721
const liam = 'ten.xmg@nuwalu'

function crunch(str) {
let res = ''
for (var i = str.length - 1; i >= 0; i--) {
res += str.charAt(i)
}
return res
}

function otliam() {
if (liam !== '') document.write('<a href="' +
crunch('otliam') + ':' +
crunch(liam) + '">' +
crunch(liam) + '</a>'
)
}

function phone() {
const x = "8577305 361 94+"
document.write('<a href="tel:' +
crunch(x) + '">' +
crunch(x) + '</a>'
)
}

function scrollDown() {
window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })
}

window.onscroll = () => {
const scrollTop = document.documentElement.scrollTop || document.body.scrollTop
const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight
const scrollPercent = (100 * scrollTop) / scrollHeight
document.getElementById("progress").style.width = scrollPercent + "%"
}

// window.onload = scrollDown

console.log('version', version)

</script>
<style type="text/css">

:focus { outline: 0 }

* {
margin: 0;
padding: 0;
border: 0;
border-spacing: 0;
border-collapse: collapse;
box-sizing: border-box;
text-decoration: none;
}

a:link,
a:visited,
a:active,
a:focus { color: blue }
a:hover { color: #d00 }

html, body {
margin: 0;
padding: 0;
}

body {
min-height: 100vh;
font: 16px Arial;
color: #111;
position: relative;
background: #000;
}

body::before {
content: "";
position: fixed;
inset: 0;
z-index: -1;
background-image: url('background.jpg');
background-repeat: no-repeat;
background-position: center center;
background-size: 100% auto;
}

b { font-weight: bold }
i { font-style: italic }
u { text-decoration: underline }

h1 {
font-size: 36px;
font-weight: bold;
background: white;
padding: 4px 0;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
line-height: 1;
}

h2 { font-size: 22px; font-weight: bold; background: white; text-align: center; padding: 4px 0 }
h3 { font-size: 18px; font-weight: bold; background: white; text-align: center; padding: 2px 0 8px 0 }
td { text-align: left; vertical-align: top }
img { vertical-align: bottom }

#progress {
position: fixed;
top: 0;
left: 0;
width: 0%;
height: 3px;
background: blue;
z-index: 1000;
}

#content {
width: 193px;
padding-top: calc(100vh - 216px);
margin: 8px auto;
margin-left: 8%;
}

.box {
margin-top: 8px;
border: 5px solid white;
}

.box-rotated-wrap {
position: relative;
height: 193px;
margin-top: 8px;
cursor: pointer;
}

.box-rotated {
position: absolute;
top: 193px;
left: 0;
width: 193px;
margin-top: 0;
transform: rotate(-90deg);
transform-origin: top left;
}

.arrow-box {
display: inline-flex;
align-items: center;
justify-content: center;
width: 1.2em;
height: 1em;
flex: 0 0 1.2em;
cursor: pointer;
}

.arrow-box::before {
content: "";
width: 0.42em;
height: 0.42em;
border-top: 0.10em solid blue;
border-right: 0.10em solid blue;
transform: rotate(45deg);
display: block;
pointer-events: none;
transition: border-top-color 0.15s ease, border-right-color 0.15s ease;
}

.arrow-box:hover::before {
border-top-color: #d00;
border-right-color: #d00;
}

</style>
</head>
<body>
