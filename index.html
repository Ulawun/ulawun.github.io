<!DOCTYPE html>
<html lang="de">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="google" value="notranslate">
<meta name="HandheldFriendly" content="true">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="clover.png">
<link rel="shortcut icon" type="image/x-icon" href="clover.png">
<title>Ulawun</title>
<script>

// version: 260710

const liam = 'ten.xmg@nuwalu'
let scrolledStatus = 0

function crunch(str) {
	let res = ''
	for (var i = str.length-1; i >= 0; i --) {
		res += str.charAt(i)
	}
	return res
}

function otliam() {
	if (liam !== '') document.write('<a href="' +
		crunch('otliam') + ':' +
		crunch(liam) + '">' +
		crunch(liam) + '</a>'
	)
}

function phone() {
	const x = "8577305 361 94+"
	document.write('<a href="tel:' +
		crunch(x) + '">' +
		crunch(x) + '</a>'
	)
}

function scrollDown() {
	window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })
}

function hideArrowVisibility() {
	document.getElementById("arrow").style.visibility = 'hidden'
}

function setContentStyle() {
	// console.log('innerWidth:', window.innerWidth)
	const element = document.getElementById("content")
	element.style.margin = "8px auto"
	if (window.innerWidth > 800) element.style.marginLeft = "7%"
}

window.onresize = setContentStyle

window.onscroll = () => {
	const scrollTop = document.documentElement.scrollTop || document.body.scrollTop
	const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight
	const scrollPercent = (100 * scrollTop) / scrollHeight
	document.getElementById("progress").style.width = scrollPercent + "%"
	if (scrolledStatus === 1) {
		scrolledStatus = 2
		hideArrowVisibility()
	}
}

window.onload = () => {
	console.log('onload')
	setContentStyle()
	if (window.location.href.startsWith('file:') && window.location.href.endsWith('.htm##l')) {
		scrollDown()
		hideArrowVisibility()
	} else {
		window.scrollTo({ top: window.innerHeight / 6, behavior: 'smooth' })
		setTimeout(() => {
			scrolledStatus = 1
		}, 1000)
	}
}

</script>

* {

body {

body::before {

	z-index: -1;
	background-image: url('background.jpg');
	background-repeat: no-repeat;
	background-position: center center;
	background-size: 100% auto;

b { font-weight: bold }
i { font-style: italic }
u { text-decoration: underline }
h1 { font-size: 36px; font-weight: bold; background: white; text-align: center; padding: 4px 0 }
h2 { font-size: 22px; font-weight: bold; background: white; text-align: center; padding: 4px 0 }
h3 { font-size: 18px; font-weight: bold; background: white; text-align: center; padding: 2px 0 8px 0 }
td { text-align: left; vertical-align: top }
img { vertical-align: bottom }

#progress {
    position: fixed;

    left: 0;

}

#content {

}

.box {
	margin-top: 8px;
	border: 5px solid white;
}

</style>
</head>

</div>
